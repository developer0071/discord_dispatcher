name: Discord Automation Pipeline

on:
  workflow_dispatch: # Allows manual execution directly from the GitHub Actions UI
  schedule:
    # Runs every 6 hours, offset by 14 minutes to bypass GitHub queue delays
    - cron: '14 */6 * * *'

jobs:
  execute-broadcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Messaging Script
      env:
        # Inject repository secrets safely into the runner's workspace environment
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: python send_message.py
