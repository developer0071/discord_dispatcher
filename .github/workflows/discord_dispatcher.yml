name: Discord Automation Pipeline

on:
  workflow_dispatch:
  schedule:
    # Every ~7 hours, dynamically spread across the week.
    # Offset by 23 minutes to avoid GitHub's busy :00 slots.
    # Pattern: 0, 7, 14, 21 hours UTC — repeating every day.
    - cron: '23 0,7,14,21 * * *'

jobs:
  execute-broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.DISCORD_TOKEN }}" ]; then
            echo "[CRITICAL] DISCORD_TOKEN secret is not set."
            exit 1
          fi
          if [ -z "${{ secrets.CHANNEL_ID }}" ]; then
            echo "[CRITICAL] CHANNEL_ID secret is not set."
            exit 1
          fi

      - name: Execute Messaging Script
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python send_message.py