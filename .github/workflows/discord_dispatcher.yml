name: Discord Automation Pipeline

on:
  workflow_dispatch: # Allows manual execution directly from the GitHub Actions UI
  schedule:
    # True rolling 7-hour interval offset by 14 minutes (Calculated across a 7-day cycle)
    - cron: '14 0,7,14,21 * * 0'  # Sunday
    - cron: '14 4,11,18 * * 1'     # Monday
    - cron: '14 1,8,15,22 * * 2'   # Tuesday
    - cron: '14 5,12,19 * * 3'     # Wednesday
    - cron: '14 2,9,16,23 * * 4'   # Thursday
    - cron: '14 6,13,20 * * 5'     # Friday
    - cron: '14 3,10,17 * * 6'     # Saturday

jobs:
  execute-broadcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Messaging Script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      run: python send_message.py
