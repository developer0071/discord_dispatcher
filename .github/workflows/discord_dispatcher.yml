name: Discord Automation Pipeline

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI
  schedule:
    # 5.5 hour intervals mapped across a 24-hour UTC cycle
    
    # Fires at 00:00, 11:00, 22:00 UTC (05:00, 16:00, 03:00 Local Time)
    - cron: '0 0,11,22 * * *' 
    
    # Fires at 05:30, 16:30 UTC (10:30, 21:30 Local Time)
    - cron: '30 5,16 * * *'

jobs:
  execute-broadcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Messaging Script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        DISCORD_MESSAGE: "Automated status check: Operational."
      run: python send_message.py